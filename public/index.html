<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spork ⚡ Kanban</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #222;
      --text: #e8e8e8;
      --muted: #555;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

    /* ── HEADER ── */
    header { background:#111; border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:10px; }
    .logo { font-size:15px; font-weight:700; color:#fff; white-space:nowrap; }
    .logo span { color:#818cf8; }
    .header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

    /* ── TABS ── */
    .tabs { display:flex; border-bottom:1px solid var(--border); background:#111; padding:0 20px; gap:2px; }
    .tab { padding:8px 16px; font-size:13px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; cursor:pointer; transition:all .15s; background:none; border-top:none; border-left:none; border-right:none; }
    .tab.active { color:#818cf8; border-bottom-color:#818cf8; }
    .tab:hover { color:#aaa; }

    /* ── BUTTONS ── */
    .btn { background:#4f46e5; color:#fff; border:none; padding:6px 13px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:background .15s; white-space:nowrap; }
    .btn:hover { background:#4338ca; }
    .btn.secondary { background:#1e1e1e; color:var(--text); border:1px solid var(--border); }
    .btn.secondary:hover { background:#2a2a2a; }
    .btn.danger { background:#7f1d1d; }
    .btn.danger:hover { background:#991b1b; }
    .btn.sm { padding:4px 9px; font-size:11px; }
    .btn.warn { background:#78350f; color:#fcd34d; border:none; }
    .btn.warn.active { background:#fbbf24; color:#111; }

    select { background:#1a1a1a; border:1px solid var(--border); color:var(--text); padding:5px 9px; border-radius:6px; font-size:12px; cursor:pointer; }

    /* ── VIEW PANELS ── */
    .view { display:none; flex:1; }
    .view.active { display:flex; flex-direction:column; }

    /* ── BOARD (swimlane view) ── */
    .board-wrap { flex:1; overflow:auto; padding:16px; }
    .swimlane { margin-bottom:24px; }
    .swimlane-header { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#1a1a1a; border:1px solid var(--border); border-radius:8px 8px 0 0; cursor:pointer; user-select:none; }
    .swimlane-header h3 { font-size:13px; font-weight:700; color:var(--text); flex:1; }
    .swimlane-header .sw-count { font-size:11px; color:var(--muted); background:#222; padding:2px 7px; border-radius:99px; }
    .swimlane-header .sw-toggle { color:var(--muted); font-size:12px; transition:transform .2s; }
    .swimlane-header.collapsed .sw-toggle { transform:rotate(-90deg); }
    .swimlane-body { display:flex; gap:12px; padding:12px; background:#111; border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; overflow-x:auto; }
    .swimlane-body.hidden { display:none; }

    /* ── COLUMNS ── */
    .column { width:250px; flex-shrink:0; background:var(--surface); border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; }
    .col-header { padding:10px 12px; border-radius:8px 8px 0 0; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
    .col-title { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .col-count { font-size:10px; font-weight:600; padding:1px 6px; border-radius:99px; background:rgba(255,255,255,.06); color:var(--muted); }
    .col-backlog .col-header { background:#1a2234; } .col-backlog .col-title { color:#64748b; }
    .col-inprogress .col-header { background:#1a1a3a; } .col-inprogress .col-title { color:#818cf8; }
    .col-inreview .col-header { background:#241a0e; } .col-inreview .col-title { color:#fbbf24; }
    .col-blocked .col-header { background:#1f0f0f; } .col-blocked .col-title { color:#f87171; }
    .col-done .col-header { background:#0e1f14; } .col-done .col-title { color:#4ade80; }
    .col-cards { flex:1; padding:8px; display:flex; flex-direction:column; gap:6px; min-height:60px; }
    .col-cards.drag-over { background:rgba(99,102,241,.06); border-radius:0 0 8px 8px; }

    /* ── CARDS ── */
    .card { background:#1c1c1c; border:1px solid #272727; border-radius:7px; padding:10px; cursor:grab; transition:border-color .15s; position:relative; }
    .card:hover { border-color:#3a3a3a; }
    .card.dragging { opacity:.4; }
    .card.waiting { border-left:3px solid #fbbf24 !important; }
    .card-project { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .card-title { font-size:12px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:5px; }
    .card-desc { font-size:11px; color:#555; line-height:1.5; margin-bottom:6px; }
    .card-meta { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; }
    .badge { font-size:10px; padding:1px 6px; border-radius:99px; font-weight:600; }
    .badge.due-ok { background:#0e1f14; color:#4ade80; }
    .badge.due-soon { background:#241a0e; color:#fbbf24; }
    .badge.due-over { background:#1f0f0f; color:#f87171; }
    .badge.gh { background:#1a1a3a; color:#818cf8; text-decoration:none; display:inline-block; }
    .badge.waiting-badge { background:#241a0e; color:#fbbf24; }
    .card-comment-count { font-size:10px; color:#444; }
    .card-footer { display:flex; align-items:center; justify-content:space-between; }
    .card-date { font-size:10px; color:#383838; }
    .card-actions { display:flex; gap:3px; opacity:0; transition:opacity .15s; }
    .card:hover .card-actions { opacity:1; }
    .card-btn { background:none; border:1px solid #2a2a2a; color:#555; font-size:10px; padding:2px 5px; border-radius:4px; cursor:pointer; }
    .card-btn:hover { background:#2a2a2a; color:#aaa; }
    .card-btn.del:hover { background:#3a0f0f; color:#f87171; border-color:#7f1d1d; }
    .priority-high { border-left:3px solid #f87171; }
    .priority-normal { border-left:3px solid #272727; }
    .priority-low { border-left:3px solid #222; }

    /* ── ACTIVITY LOG ── */
    .log-wrap { flex:1; overflow-y:auto; padding:16px; max-width:800px; margin:0 auto; width:100%; }
    .log-entry { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid #1a1a1a; align-items:flex-start; }
    .log-icon { font-size:16px; width:24px; text-align:center; flex-shrink:0; margin-top:1px; }
    .log-body { flex:1; }
    .log-title { font-size:13px; color:var(--text); line-height:1.4; }
    .log-title strong { color:#818cf8; }
    .log-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .log-project { font-size:10px; background:#1a1a3a; color:#818cf8; padding:1px 6px; border-radius:99px; font-weight:600; }

    /* ── MODAL ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:24px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
    .modal h2 { font-size:15px; font-weight:700; margin-bottom:18px; }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:4px; }
    .form-group input, .form-group textarea, .form-group select { width:100%; background:#111; border:1px solid #2a2a2a; color:var(--text); padding:7px 9px; border-radius:6px; font-size:12px; font-family:inherit; }
    .form-group textarea { height:70px; resize:vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline:2px solid #4f46e5; border-color:transparent; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .checkbox-row { display:flex; align-items:center; gap:8px; }
    .checkbox-row input[type=checkbox] { width:auto; }
    .checkbox-row label { font-size:12px; color:var(--text); text-transform:none; letter-spacing:0; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }

    /* ── COMMENTS ── */
    .comments-section { margin-top:14px; border-top:1px solid #222; padding-top:12px; }
    .comments-section h4 { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; }
    .comment { background:#111; border:1px solid #1e1e1e; border-radius:6px; padding:8px 10px; margin-bottom:6px; }
    .comment-header { display:flex; justify-content:space-between; margin-bottom:3px; }
    .comment-author { font-size:10px; font-weight:700; color:#818cf8; }
    .comment-ts { font-size:10px; color:#333; }
    .comment-text { font-size:12px; color:#aaa; line-height:1.5; }
    .comment-input-row { display:flex; gap:6px; margin-top:8px; }
    .comment-input-row input { flex:1; background:#111; border:1px solid #2a2a2a; color:var(--text); padding:6px 9px; border-radius:6px; font-size:12px; font-family:inherit; }
    .comment-input-row input:focus { outline:2px solid #4f46e5; border-color:transparent; }

    .empty-col { text-align:center; padding:20px 10px; color:#2a2a2a; font-size:11px; }
    .hidden { display:none !important; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:99px; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡ <span>Spork</span> Kanban</div>
  <div class="header-right">
    <select id="project-filter"><option value="all">All Projects</option></select>
    <a href="http://127.0.0.1:18789/" target="_blank" style="text-decoration:none;">
      <button class="btn secondary">⚙️ Config</button>
    </a>
    <button class="btn" id="new-task-btn">+ New Task</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-view="board">📋 Board</button>
  <button class="tab" data-view="log">📜 Activity Log</button>
</div>

<!-- BOARD VIEW -->
<div class="view active" id="view-board">
  <div class="board-wrap" id="board-wrap">
    <!-- swimlanes injected by JS -->
  </div>
</div>

<!-- ACTIVITY LOG VIEW -->
<div class="view" id="view-log">
  <div class="log-wrap" id="log-wrap">
    <p style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Loading activity...</p>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay hidden" id="task-modal">
  <div class="modal">
    <h2 id="modal-title">New Task</h2>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="f-title" placeholder="What needs doing?">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Details, context, links..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Project</label>
        <select id="f-project"></select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="f-priority">
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="f-due">
      </div>
      <div class="form-group">
        <label>GitHub URL</label>
        <input type="url" id="f-github" placeholder="https://github.com/...">
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" id="f-waiting">
        <label for="f-waiting">👋 Waiting on Conner — needs your input</label>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Additional notes..."></textarea>
    </div>

    <!-- Comments (edit mode only) -->
    <div class="comments-section hidden" id="comments-section">
      <h4>💬 Comments</h4>
      <div id="comments-list"></div>
      <div class="comment-input-row">
        <input type="text" id="comment-input" placeholder="Add a comment...">
        <button class="btn sm" id="comment-submit">Send</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn secondary" id="modal-cancel">Cancel</button>
      <button class="btn danger hidden" id="modal-delete">Delete</button>
      <button class="btn" id="modal-save">Add to Backlog</button>
    </div>
  </div>
</div>

<script>
  const API = '';
  let tasks = [], projects = [], activeFilter = 'all', dragId = null, editingId = null;
  const COLS = ['backlog','inprogress','inreview','blocked','done'];
  const COL_LABELS = { backlog:'📋 Backlog', inprogress:'🔵 In Progress', inreview:'🟡 In Review', blocked:'🔴 Blocked', done:'✅ Done' };
  let collapsedSwim = {};

  // ── Load ──────────────────────────────────────────────────────────────────
  async function load() {
    const [tRes, pRes] = await Promise.all([fetch(`${API}/api/tasks`), fetch(`${API}/api/projects`)]);
    const data = await tRes.json();
    tasks = data.tasks;
    projects = await pRes.json();
    renderAll();
  }

  async function loadLog() {
    const res = await fetch(`${API}/api/activity`);
    const log = await res.json();
    renderLog(log);
  }

  // ── Render Board ──────────────────────────────────────────────────────────
  function renderAll() {
    // project filter
    const pf = document.getElementById('project-filter');
    const pfv = pf.value;
    pf.innerHTML = '<option value="all">All Projects</option>' + projects.map(p=>`<option value="${p}"${p===pfv?' selected':''}>${p}</option>`).join('');
    activeFilter = pf.value;

    // modal project select
    const fp = document.getElementById('f-project');
    const fpv = fp.value;
    fp.innerHTML = projects.map(p=>`<option value="${p}"${p===fpv?' selected':''}>${p}</option>`).join('');

    // get visible tasks
    const visible = tasks.filter(t => activeFilter === 'all' || t.project === activeFilter);

    // group by project
    const byProject = {};
    visible.forEach(t => {
      if (!byProject[t.project]) byProject[t.project] = [];
      byProject[t.project].push(t);
    });

    const wrap = document.getElementById('board-wrap');
    wrap.innerHTML = '';

    if (Object.keys(byProject).length === 0) {
      wrap.innerHTML = '<p style="color:#333;text-align:center;padding:60px;font-size:13px;">No tasks yet — add one!</p>';
      return;
    }

    Object.entries(byProject).forEach(([project, ptasks]) => {
      const swim = document.createElement('div');
      swim.className = 'swimlane';
      const collapsed = collapsedSwim[project];

      swim.innerHTML = `
        <div class="swimlane-header${collapsed?' collapsed':''}" data-project="${project}">
          <h3>${project}</h3>
          <span class="sw-count">${ptasks.length} task${ptasks.length!==1?'s':''}</span>
          <span class="sw-toggle">▼</span>
        </div>
        <div class="swimlane-body${collapsed?' hidden':''}">
          ${COLS.map(status => `
            <div class="column col-${status}" data-status="${status}">
              <div class="col-header">
                <span class="col-title">${COL_LABELS[status]}</span>
                <span class="col-count">0</span>
              </div>
              <div class="col-cards" id="col-${status}-${slugify(project)}"></div>
            </div>
          `).join('')}
        </div>
      `;

      // header collapse toggle
      swim.querySelector('.swimlane-header').addEventListener('click', () => {
        collapsedSwim[project] = !collapsedSwim[project];
        renderAll();
      });

      wrap.appendChild(swim);

      // fill columns
      COLS.forEach(status => {
        const el = document.getElementById(`col-${status}-${slugify(project)}`);
        const colTasks = ptasks.filter(t => t.status === status);
        el.innerHTML = colTasks.length ? '' : '<div class="empty-col">—</div>';
        colTasks.forEach(t => el.appendChild(makeCard(t)));
        el.closest('.column').querySelector('.col-count').textContent = colTasks.length;
      });
    });

    setupDrop();
  }

  function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]/g,'_'); }

  function dueBadge(due) {
    if (!due) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(due + 'T00:00:00');
    const diff = Math.round((d - today) / 86400000);
    if (diff < 0) return `<span class="badge due-over">⚠️ Overdue</span>`;
    if (diff === 0) return `<span class="badge due-soon">📅 Today</span>`;
    if (diff <= 3) return `<span class="badge due-soon">📅 ${diff}d</span>`;
    return `<span class="badge due-ok">📅 ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;
  }

  function makeCard(task) {
    const div = document.createElement('div');
    div.className = `card priority-${task.priority||'normal'}${task.waitingOnConner?' waiting':''}`;
    div.dataset.id = task.id;
    div.draggable = true;
    const cc = (task.comments||[]).length;
    div.innerHTML = `
      <div class="card-title">${task.title}</div>
      ${task.description ? `<div class="card-desc">${task.description}</div>` : ''}
      <div class="card-meta">
        ${dueBadge(task.dueDate)}
        ${task.githubUrl ? `<a href="${task.githubUrl}" target="_blank" class="badge gh">⎇ GitHub</a>` : ''}
        ${task.waitingOnConner ? `<span class="badge waiting-badge">👋 Waiting on Conner</span>` : ''}
      </div>
      <div class="card-footer">
        <span class="card-date">${cc > 0 ? `💬 ${cc}` : ''}</span>
        <div class="card-actions">
          <button class="card-btn edit-btn">Edit</button>
        </div>
      </div>
    `;
    div.addEventListener('dragstart', () => { dragId = task.id; setTimeout(()=>div.classList.add('dragging'),0); });
    div.addEventListener('dragend', () => { div.classList.remove('dragging'); dragId = null; });
    div.querySelector('.edit-btn').addEventListener('click', e => { e.stopPropagation(); openEdit(task); });
    div.addEventListener('dblclick', () => openEdit(task));
    return div;
  }

  // ── Drag & Drop ───────────────────────────────────────────────────────────
  function setupDrop() {
    document.querySelectorAll('.col-cards').forEach(col => {
      col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
      col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
      col.addEventListener('drop', async e => {
        e.preventDefault(); col.classList.remove('drag-over');
        if (!dragId) return;
        const colEl = col.closest('.column');
        const newStatus = colEl.dataset.status;
        await fetch(`${API}/api/tasks/${dragId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status: newStatus, _by: 'Conner' }) });
        await load();
      });
    });
  }

  // ── Activity Log ──────────────────────────────────────────────────────────
  function renderLog(log) {
    const wrap = document.getElementById('log-wrap');
    if (!log.length) { wrap.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px;font-size:13px;">No activity yet.</p>'; return; }
    const icons = { created:'✨', moved:'🔀', deleted:'🗑️', comment:'💬', waiting:'👋' };
    wrap.innerHTML = log.map(e => {
      let desc = '';
      if (e.type==='created') desc = `<strong>${e.by||'Conner'}</strong> created <strong>${e.title}</strong>`;
      else if (e.type==='moved') desc = `<strong>${e.by||'Spork'}</strong> moved <strong>${e.title}</strong> — ${e.from} → ${e.to}`;
      else if (e.type==='deleted') desc = `<strong>${e.by||'Conner'}</strong> deleted <strong>${e.title}</strong>`;
      else if (e.type==='comment') desc = `<strong>${e.author}</strong> commented on <strong>${e.title}</strong>: <em>${e.text}</em>`;
      else if (e.type==='waiting') desc = `Spork is <strong>waiting on Conner</strong> for <strong>${e.title}</strong>`;
      const d = new Date(e.ts);
      const ts = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      return `<div class="log-entry">
        <div class="log-icon">${icons[e.type]||'•'}</div>
        <div class="log-body">
          <div class="log-title">${desc}</div>
          <div class="log-meta">${ts} &nbsp;·&nbsp; <span class="log-project">${e.project||''}</span></div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openNew() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'New Task';
    document.getElementById('modal-save').textContent = 'Add to Backlog';
    document.getElementById('modal-delete').classList.add('hidden');
    document.getElementById('comments-section').classList.add('hidden');
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-due').value = '';
    document.getElementById('f-github').value = '';
    document.getElementById('f-waiting').checked = false;
    document.getElementById('f-priority').value = 'normal';
    document.getElementById('task-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function openEdit(task) {
    editingId = task.id;
    document.getElementById('modal-title').textContent = 'Edit Task';
    document.getElementById('modal-save').textContent = 'Save Changes';
    document.getElementById('modal-delete').classList.remove('hidden');
    document.getElementById('f-title').value = task.title;
    document.getElementById('f-desc').value = task.description || '';
    document.getElementById('f-notes').value = task.notes || '';
    document.getElementById('f-due').value = task.dueDate || '';
    document.getElementById('f-github').value = task.githubUrl || '';
    document.getElementById('f-waiting').checked = !!task.waitingOnConner;
    document.getElementById('f-priority').value = task.priority || 'normal';
    document.getElementById('f-project').value = task.project;
    // comments
    const cs = document.getElementById('comments-section');
    cs.classList.remove('hidden');
    renderComments(task.comments || []);
    document.getElementById('task-modal').classList.remove('hidden');
  }

  function renderComments(comments) {
    const list = document.getElementById('comments-list');
    if (!comments.length) { list.innerHTML = '<p style="font-size:11px;color:#333;margin-bottom:6px;">No comments yet.</p>'; return; }
    list.innerHTML = comments.map(c => {
      const d = new Date(c.ts);
      const ts = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      return `<div class="comment">
        <div class="comment-header"><span class="comment-author">${c.author}</span><span class="comment-ts">${ts}</span></div>
        <div class="comment-text">${c.text}</div>
      </div>`;
    }).join('');
  }

  function closeModal() { document.getElementById('task-modal').classList.add('hidden'); editingId = null; }

  async function saveTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    const body = {
      title,
      description: document.getElementById('f-desc').value.trim(),
      project: document.getElementById('f-project').value,
      priority: document.getElementById('f-priority').value,
      notes: document.getElementById('f-notes').value.trim(),
      dueDate: document.getElementById('f-due').value || null,
      githubUrl: document.getElementById('f-github').value.trim(),
      waitingOnConner: document.getElementById('f-waiting').checked
    };
    if (editingId) {
      await fetch(`${API}/api/tasks/${editingId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    } else {
      body.status = 'backlog';
      await fetch(`${API}/api/tasks`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    }
    closeModal();
    await load();
  }

  async function deleteTask() {
    if (!editingId || !confirm('Delete this task?')) return;
    await fetch(`${API}/api/tasks/${editingId}`, { method:'DELETE' });
    closeModal();
    await load();
  }

  async function submitComment() {
    if (!editingId) return;
    const input = document.getElementById('comment-input');
    const text = input.value.trim();
    if (!text) return;
    const res = await fetch(`${API}/api/tasks/${editingId}/comments`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, author: 'Conner' })
    });
    input.value = '';
    // refresh comments in modal
    const task = tasks.find(t => t.id === editingId);
    if (task) {
      const newComment = await res.json();
      task.comments = [...(task.comments||[]), newComment];
      renderComments(task.comments);
    }
    await load();
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`view-${tab.dataset.view}`).classList.add('active');
      if (tab.dataset.view === 'log') loadLog();
    });
  });

  // ── Events ────────────────────────────────────────────────────────────────
  document.getElementById('new-task-btn').addEventListener('click', openNew);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', saveTask);
  document.getElementById('modal-delete').addEventListener('click', deleteTask);
  document.getElementById('comment-submit').addEventListener('click', submitComment);
  document.getElementById('comment-input').addEventListener('keydown', e => { if (e.key==='Enter') submitComment(); });
  document.getElementById('project-filter').addEventListener('change', e => { activeFilter = e.target.value; renderAll(); });
  document.getElementById('task-modal').addEventListener('click', e => { if (e.target===document.getElementById('task-modal')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  // ── Init ──────────────────────────────────────────────────────────────────
  load();
  setInterval(load, 15000);
</script>
</body>
</html>
